<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Evals.com Autofill</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    p {
      margin: 0 0 16px;
      color: #666;
      font-size: 13px;
      line-height: 1.4;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #444;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    #fetchBtn {
      background: #2563eb;
      color: white;
    }
    #fetchBtn:hover:not(:disabled) {
      background: #1d4ed8;
    }
    #fillBtn {
      background: #059669;
      color: white;
    }
    #fillBtn:hover:not(:disabled) {
      background: #047857;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 12px;
      background: #f3f4f6;
      color: #374151;
    }
    .status.success {
      color: #065f46;
      border: 1px solid rgba(16, 185, 129, 0.2);
      background: rgba(16, 185, 129, 0.05);
    }
    .status.error {
      color: #991b1b;
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
    }
  </style>
</head>
<body>
  <h3>Evals.com Autofill</h3>
  <p>Auto-fill student evaluations from Evals.com.</p>
  
  <div class="input-group">
    <label for="studentName">Student Full Name</label>
    <input type="text" id="studentName" placeholder="e.g. Jane Doe">
  </div>
  
  <button id="fetchBtn">Fetch from Evals.com</button>
  
  <div id="statusBox" class="status">Enter student name to load data</div>
  
  <button id="fillBtn" disabled>Auto-fill evaluation form</button>

  <script src="popup.js"></script>
</body>
</html>

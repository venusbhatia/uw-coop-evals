<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #020617; /* slate 950 */
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f8fafc;
      text-transform: uppercase;
    }
    p {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 10px;
      color: #94a3b8;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      color: #f8fafc;
      font-size: 12px;
      outline: none;
    }
    input:focus {
      border-color: #6366f1;
    }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #1e293b;
      color: #64748b;
      cursor: not-allowed;
    }
    .status {
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
      background: #0f172a;
      border: 1px solid #1e293b;
      margin-bottom: 12px;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .success {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.2);
      background: rgba(16, 185, 129, 0.05);
    }
    .error {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
    }
  </style>
</head>
<body>
  <h3>WaterlooWorks Filler</h3>
  <p>Auto-fill student evaluations from Employee Evals.</p>
  
  <div class="input-group">
    <label for="studentName">Student Full Name</label>
    <input type="text" id="studentName" placeholder="e.g. Jane Doe">
  </div>
  
  <button id="fetchBtn">Fetch From Hub</button>
  
  <div id="statusBox" class="status">Enter student name to load data</div>
  
  <button id="fillBtn" disabled>Auto-fill WaterlooWorks Form</button>

  <script src="popup.js"></script>
</body>
</html>
